<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Clips - Estudio de Renderizado Avanzado</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #181f25;
            --kick-green: #53fc18;
            --text-color: #ffffff;
            --accent-blue: #29b6f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .controls-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
            border: 1px solid #2d3843;
        }

        .upload-btn {
            background: #2a3541;
            border: 2px dashed var(--kick-green);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .input-group input[type="text"], .input-group select {
            width: 100%;
            box-sizing: border-box;
            background: #2a3541;
            border: 1px solid #475569;
            padding: 10px;
            border-radius: 6px;
            color: #fff;
        }

        .config-box {
            background: #1f2831;
            border: 1px solid var(--kick-green);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .config-box h4 {
            color: var(--kick-green);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button.render-btn {
            background-color: var(--kick-green);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }

        button.render-btn:disabled {
            background-color: #4a5a45;
            color: #888;
            cursor: not-allowed;
        }

        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tiktok-template {
            width: 360px;
            height: 640px; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            border: 4px solid #2d3843;
        }

        #source-video { display: none; }
        #canvas-render { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            cursor: grab;
        }
        #canvas-render:active { cursor: grabbing; }
        .status-txt { margin-top: 12px; font-weight: bold; color: var(--kick-green); text-align: center; }
    </style>
</head>
<body>

    <h1>Estudio de Renderizado Profesional</h1>

    <div class="container">
        
        <div class="controls-panel">
            <label class="upload-btn">
                <span>📁 Cargar Fragmento de Video (MP4)</span>
                <input type="file" id="video-input" accept="video/*" style="display:none;">
            </label>

            <div class="config-box">
                <h4>🛠️ Ajustes del Renderizado</h4>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="chk-mostrar-nombre" checked>
                    <label for="chk-mostrar-nombre">Mostrar Banner Inferior (Kick)</label>
                </div>

                <div class="input-group">
                    <label for="select-layout">Estilo de Formato (Layout)</label>
                    <select id="select-layout">
                        <option value="full-blur">Full Frame Blur (Tomas Amplias)</option>
                        <option value="standard">Vertical Estándar (Caja Centrada)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="txt-streamer">Nombre del Streamer (Para Ruta de Banner)</label>
                <input type="text" id="txt-streamer" value="daarick">
            </div>

            <div class="input-group">
                <label for="txt-titulo">Título del Clip (Barra Negra)</label>
                <input type="text" id="txt-titulo" value="LOS WANOS SE PERDIERON CALAVERA">
            </div>

            <input type="range" id="slider-zoom" min="10" max="50" value="10" step="0.5" style="display:none;">
            <input type="range" id="slider-pos-x" min="0" max="100" value="50" style="display:none;">
            <input type="range" id="slider-pos-y" min="0" max="100" value="50" style="display:none;">

            <button id="btn-start" class="render-btn" disabled>Exportar Clip Vertical</button>
            <div id="status" class="status-txt"></div>
        </div>

        <div class="preview-panel">
            <h3>Resultado (Arrastra / Rueda del Mouse)</h3>
            <div class="tiktok-template">
                <video id="source-video" muted loop></video>
                <canvas id="canvas-render" width="1080" height="1920"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Carga de la tipografía personalizada Anton
        const customFont = new FontFace('AntonCustom', 'url(assets/fonts/Anton-Regular.ttf)');
        customFont.load().then((loadedFont) => {
            document.fonts.add(loadedFont);
            drawFrame();
        }).catch(err => console.log("Verifica que tu fuente esté en assets/anton.ttf"));

        // Marca de agua fija de tu canal
        const logoStreamRadar = new Image();
        logoStreamRadar.src = 'assets/logos/streamradar_logo.png';
        logoStreamRadar.onload = () => drawFrame();

        // Objeto dinámico para el Banner del Streamer actual
        const streamerBannerImg = new Image();

        const videoInput = document.getElementById('video-input');
        const sourceVideo = document.getElementById('source-video');
        const canvas = document.getElementById('canvas-render');
        const ctx = canvas.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        const statusDiv = document.getElementById('status');

        const sliderZoom = document.getElementById('slider-zoom');
        const sliderPosX = document.getElementById('slider-pos-x');
        const sliderPosY = document.getElementById('slider-pos-y');
        
        const chkMostrarNombre = document.getElementById('chk-mostrar-nombre');
        const selectLayout = document.getElementById('select-layout');
        const txtStreamerInput = document.getElementById('txt-streamer');
        const txtTituloInput = document.getElementById('txt-titulo');

        let mediaRecorder;
        let recordedChunks = [];
        let animationFrameId;
        let isDragging = false;
        let startX = 0, startY = 0;

        // Cargar el banner dinámico cuando cambia el input de texto del streamer
        function actualizarRutaBanner() {
            const name = txtStreamerInput.value.trim().toLowerCase();
            streamerBannerImg.src = `assets/banners/${name}.jpg`;
        }
        streamerBannerImg.onload = () => drawFrame();
        streamerBannerImg.onerror = () => drawFrame(); // Redibuja aunque no encuentre la imagen

        txtStreamerInput.addEventListener('input', () => {
            actualizarRutaBanner();
            drawFrame();
        });

        // CONTROL DE ZOOM POR RUEDA DEL MOUSE (WHEEL)
        canvas.addEventListener('wheel', (e) => {
            if (sourceVideo.videoWidth === 0) return;
            e.preventDefault(); // Evita que la página web haga scroll

            let currentZoom = parseFloat(sliderZoom.value);
            // Si la rueda va hacia arriba, aumenta zoom; si va hacia abajo, disminuye
            if (e.deltaY < 0) {
                currentZoom = Math.min(50, currentZoom + 0.5);
            } else {
                currentZoom = Math.max(10, currentZoom - 0.5);
            }
            
            sliderZoom.value = currentZoom;
            drawFrame();
        }, { passive: false });

        // Control de reencuadre por arrastre (Drag & Drop)
        canvas.addEventListener('mousedown', (e) => {
            if (sourceVideo.videoWidth === 0) return;
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            startX = e.clientX; startY = e.clientY;

            let nextX = parseInt(sliderPosX.value) - (deltaX * 0.4);
            let nextY = parseInt(sliderPosY.value) - (deltaY * 0.4);

            sliderPosX.value = Math.max(0, Math.min(100, nextX));
            sliderPosY.value = Math.max(0, Math.min(100, nextY));
            drawFrame();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        chkMostrarNombre.addEventListener('change', drawFrame);
        selectLayout.addEventListener('change', drawFrame);
        txtTituloInput.addEventListener('input', drawFrame);

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                sourceVideo.src = URL.createObjectURL(file);
                sourceVideo.load();
                sourceVideo.onloadedmetadata = () => {
                    statusDiv.innerText = "Video cargado. Usa el mouse para arrastrar y la rueda para el zoom.";
                    btnStart.disabled = false;
                    actualizarRutaBanner();
                    sourceVideo.currentTime = 0;
                    setTimeout(drawFrame, 250);
                };
            }
        });

        function drawFrame() {
            // Fondo base negro
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const streamerName = txtStreamerInput.value.trim().toUpperCase();
            const clipTitle = txtTituloInput.value.toUpperCase();
            const layoutMode = selectLayout.value;

            if (sourceVideo.videoWidth > 0) {
                const zoomFactor = sliderZoom.value / 10;
                const pctX = sliderPosX.value / 100;
                const pctY = sliderPosY.value / 100;

                // --- CAPA 1: FONDO GENERAL EN BLUR COMPLETO (Para rellenar los bordes arriba y abajo) ---
                ctx.save();
                ctx.filter = 'blur(40px) brightness(0.4)';
                // Estiramos el video original a todo el lienzo vertical (1080x1920)
                ctx.drawImage(sourceVideo, 0, 0, sourceVideo.videoWidth, sourceVideo.videoHeight, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // --- CAPA 2: VIDEO ENFOCADO CENTRAL (REENCUADRABLE) ---
                // Definimos el tamaño del recorte en el video de origen respetando la relación de aspecto del contenedor
                const targetWidthInSource = (sourceVideo.videoHeight * (1080 / 960)) / zoomFactor;
                const targetHeightInSource = sourceVideo.videoHeight / zoomFactor;
                const maxX = sourceVideo.videoWidth - targetWidthInSource;
                const maxY = sourceVideo.videoHeight - targetHeightInSource;

                // Dibujamos el feed principal en la franja central (Alto de 960px, comenzando en Y: 150px)
                ctx.drawImage(sourceVideo, 
                    maxX * pctX, maxY * pctY, targetWidthInSource, targetHeightInSource,
                    0, 150, 1080, 960
                );
            }

            // --- CAPA 3: BARRA NEGRA DE TÍTULO CENTRAL (Justo abajo del video enfocado, Y: 1110) ---
            const barHeight = 90;
            const barY = 1110; 
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, barY, canvas.width, barHeight);

            // --- CAPA 4: TEXTO DEL TÍTULO EN FUENTE ANTON ---
            ctx.save();
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "46px 'AntonCustom', Impact, sans-serif";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillText(clipTitle, 540, barY + (barHeight / 2));
            ctx.restore();

            // --- CAPA 5: MARCA DE TEXTO "KICK | STREAMER" (Posicionado exactamente debajo de la barra negra, Y: 1235) ---
            if (chkMostrarNombre.checked) {
                ctx.save();
                const badgeY = 1235; 
                ctx.font = "bold 26px 'AntonCustom', Arial, sans-serif";
                ctx.textBaseline = "middle";
                
                const textKick = "KICK ";
                const textSeparator = "|  " + streamerName;
                
                const widthKick = ctx.measureText(textKick).width;
                const widthSeparator = ctx.measureText(textSeparator).width;
                const totalWidth = widthKick + widthSeparator;
                
                const startXText = (canvas.width - totalWidth) / 2;

                // Imprimir KICK en Verde fosforescente
                ctx.fillStyle = "#53fc18";
                ctx.textAlign = "left";
                ctx.fillText(textKick, startXText, badgeY);

                // Imprimir el Separador y Nombre en Blanco
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText(textSeparator, startXText + widthKick, badgeY);
                ctx.restore();
            }

            // --- CAPA 6: BANNER DEL STREAMER CORREGIDO (Abajo de los textos informativos, Y: 1270) ---
            if (streamerBannerImg.complete && streamerBannerImg.naturalWidth !== 0) {
                ctx.save();
                const bannerY = 1270; // Posición pegada a la zona interactiva central
                const bannerHeight = 110;
                
                if (streamerBannerImg.naturalWidth < canvas.width) {
                    // Si el banner es angosto, aplicamos el espejo con blur de fondo para evitar los bloques negros
                    ctx.save();
                    ctx.filter = 'blur(15px) brightness(0.6)';
                    ctx.drawImage(streamerBannerImg, 0, bannerY, canvas.width, bannerHeight);
                    ctx.restore();
                    
                    // Banner nítido centrado
                    const centeredX = (canvas.width - streamerBannerImg.naturalWidth) / 2;
                    ctx.drawImage(streamerBannerImg, centeredX, bannerY);
                } else {
                    ctx.drawImage(streamerBannerImg, 0, bannerY, canvas.width, bannerHeight);
                }
                ctx.restore();
            }

            // --- CAPA 7: MARCA DE AGUA CORPORATIVA SUPERIOR (LOGOSSTREAMRADAR) ---
            if (logoStreamRadar.complete && logoStreamRadar.naturalWidth !== 0) {
                ctx.drawImage(logoStreamRadar, 920, 40, 120, 120);
            }

            if (!sourceVideo.paused && !sourceVideo.ended) {
                animationFrameId = requestAnimationFrame(drawFrame);
            }
        }

            // --- CAPA 4: BARRA NEGRA DE TÍTULO CENTRAL ---
            const barHeight = 90;
            const barY = 1110; 
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, barY, canvas.width, barHeight);

            // --- CAPA 5: TEXTO EN FUENTE ANTON ---
            ctx.save();
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "46px 'AntonCustom', Impact, sans-serif";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillText(clipTitle, 540, barY + (barHeight / 2));
            ctx.restore();

            // --- CAPA 6: CUADRO DE LOGO KICK PERSONALIZADO BAJO LA BARRA ---
            if (chkMostrarNombre.checked) {
                ctx.save();
                const badgeY = 1240; 
                
                // Fondo de la caja de Kick entero
                ctx.fillStyle = "#53fc18";
                ctx.fillRect(400, badgeY - 28, 75, 36);
                
                // Palabra KICK interna
                ctx.fillStyle = "#000000";
                ctx.font = "bold 22px 'AntonCustom', Arial, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("KICK", 437, badgeY - 2);

                // Barra y nombre del streamer contiguo
                ctx.fillStyle = "#FFFFFF";
                ctx.font = "bold 26px 'AntonCustom', Arial, sans-serif";
                ctx.textAlign = "left";
                ctx.fillText(`|  ${streamerName}`, 490, badgeY - 2);
                ctx.restore();
            }

            // --- CAPA 7: LOGO DE TU CANAL (LOGOSSTREAMRADAR) ---
            if (logoStreamRadar.complete && logoStreamRadar.naturalWidth !== 0) {
                ctx.drawImage(logoStreamRadar, 920, 40, 120, 120);
            }

            if (!sourceVideo.paused && !sourceVideo.ended) {
                animationFrameId = requestAnimationFrame(drawFrame);
            }
        

        // MOTOR DE RENDERIZADO ASÍNCRONO
        btnStart.addEventListener('click', async () => {
            statusDiv.innerText = "Procesando codificación de video... no cambies de pestaña.";
            btnStart.disabled = true;
            recordedChunks = [];

            const videoStream = canvas.captureStream(30); 
            let combinedStream = videoStream;

            if (sourceVideo.captureStream || sourceVideo.mozCaptureStream) {
                const nativeStream = sourceVideo.captureStream ? sourceVideo.captureStream() : sourceVideo.mozCaptureStream();
                const audioTracks = nativeStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    combinedStream = new MediaStream([videoStream.getVideoTracks()[0], audioTracks[0]]);
                }
            }

            mediaRecorder = new MediaRecorder(combinedStream, {
                mimeType: 'video/webm;codecs=vp9,opus',
                videoBitsPerSecond: 8500000 
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `clip_${txtStreamerInput.value.toLowerCase()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                statusDiv.innerText = "¡Video exportado exitosamente!";
                btnStart.disabled = false;
            };

            sourceVideo.play();
            drawFrame();
            mediaRecorder.start();

            sourceVideo.onended = () => {
                mediaRecorder.stop();
                cancelAnimationFrame(animationFrameId);
            };
        });
    </script>
</body>
</html>
